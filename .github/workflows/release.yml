# Build and release SyncCore binaries for Windows, macOS, and Linux.
#
# Trigger: push a version tag like v1.0.0
#   git tag v1.0.0 && git push --tags
#
# What happens:
#   1. Tests run on all three platforms
#   2. Frontend is built once and shared across jobs
#   3. PyInstaller produces a one-folder bundle per OS
#   4. Bundles are zipped and attached to a GitHub Release

name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write          # needed to create releases

env:
  PYTHON_VERSION: "3.12"
  NODE_VERSION: "20"

jobs:
  # ── 1. Run tests ──────────────────────────────────────────────────────
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Run tests
        run: python -m pytest tests/ -v

  # ── 2. Build the React frontend (once, shared across OS jobs) ─────────
  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install & build
        working-directory: web
        run: |
          npm ci
          npm run build

      - uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: web/dist/
          retention-days: 1

  # ── 3. PyInstaller build matrix ───────────────────────────────────────
  build:
    needs: [test, build-frontend]
    strategy:
      matrix:
        include:
          - os: windows-latest
            artifact: SyncCore-windows
            zip_cmd: Compress-Archive -Path dist\SyncCore\* -DestinationPath SyncCore-windows.zip
            shell: pwsh
          - os: ubuntu-latest
            artifact: SyncCore-linux
            zip_cmd: cd dist && tar czf ../SyncCore-linux.tar.gz SyncCore
            shell: bash
          - os: macos-latest
            artifact: SyncCore-macos
            zip_cmd: cd dist && tar czf ../SyncCore-macos.tar.gz SyncCore
            shell: bash

    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: ${{ matrix.shell }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Python deps
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Download frontend build
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: web/dist/

      - name: Build with PyInstaller
        run: pyinstaller synccore.spec --noconfirm --clean

      # ── Strip unnecessary files from the bundle ──
      - name: Prune bundle
        shell: python
        run: |
          import shutil, pathlib

          dist = pathlib.Path("dist/SyncCore")

          # Patterns that should never ship
          remove_patterns = [
              "**/__pycache__",
              "**/test_*",
              "**/tests",
              "**/*.pyc",
              "**/*.pyo",
              "**/*.dist-info",
              "**/*.egg-info",
              "**/locale",
              "**/*.pyi",
              "**/.DS_Store",
              "**/Thumbs.db",
              "**/*.map",
          ]

          removed = 0
          for pat in remove_patterns:
              for p in dist.glob(pat):
                  if p.is_dir():
                      shutil.rmtree(p, ignore_errors=True)
                  elif p.is_file():
                      p.unlink(missing_ok=True)
                  removed += 1

          print(f"Pruned {removed} unnecessary items from bundle")

      - name: Package
        run: ${{ matrix.zip_cmd }}

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            SyncCore-windows.zip
            SyncCore-linux.tar.gz
            SyncCore-macos.tar.gz
          if-no-files-found: ignore
          retention-days: 5

  # ── 4. Create GitHub Release ──────────────────────────────────────────
  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Collect archives
        run: |
          mkdir -p release
          find artifacts/ -type f \( -name '*.zip' -o -name '*.tar.gz' \) -exec cp {} release/ \;
          ls -lh release/

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: release/*
